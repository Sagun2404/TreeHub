name: Validate PR

on:
  pull_request:
    paths:
      - "indices/**"
      - "schemas/**"
      - "registry.json"

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  validate:
    name: Validate Index Changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install jsonschema

      - name: Validate changed tree files
        run: |
          # Find all tree.json files changed in this PR
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E 'indices/.*-tree\.json$' || true)

          if [ -z "$CHANGED" ]; then
            echo "No tree files changed, skipping validation."
            exit 0
          fi

          EXIT_CODE=0
          for tree_file in $CHANGED; do
            echo "Validating: $tree_file"

            # Derive manifest path
            manifest_file=$(echo "$tree_file" | sed 's/-tree\.json$/-manifest.json/')

            if [ -f "$manifest_file" ]; then
              python scripts/validator.py "$tree_file" --manifest "$manifest_file" || EXIT_CODE=1
            else
              python scripts/validator.py "$tree_file" || EXIT_CODE=1
            fi
          done

          exit $EXIT_CODE

      - name: Validate registry.json
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "registry.json"; then
            python -c "
          import json, sys
          try:
              data = json.load(open('registry.json'))
              assert isinstance(data, dict), 'registry.json must be a JSON object'
              for name, config in data.items():
                  assert 'source_url' in config, f'{name}: missing source_url'
                  assert 'versioning' in config, f'{name}: missing versioning'
              print('✅ registry.json is valid')
          except Exception as e:
              print(f'❌ registry.json validation failed: {e}')
              sys.exit(1)
          "
          fi

      - name: Validate JSON syntax
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '\.json$' || true)
          for f in $CHANGED; do
            echo "Checking JSON syntax: $f"
            python -c "import json; json.load(open('$f'))" || exit 1
          done
          echo "✅ All JSON files are syntactically valid."
